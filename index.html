<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My photo gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>My photo gallery</h1>
    </header>

    <main>
        <div id="gallery-grid" class="gallery-grid">
            <!-- Images will be injected here by JavaScript -->
        </div>
    </main>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox" aria-hidden="true">
        <button class="close-btn" id="close-btn" aria-label="Close lightbox">&times;</button>
        <button class="nav-btn prev-btn" id="prev-btn" aria-label="Previous image">&#10094;</button>
        <div class="lightbox-content">
            <img id="lightbox-img" src="" alt="Full size image">
        </div>
        <button class="nav-btn next-btn" id="next-btn" aria-label="Next image">&#10095;</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
